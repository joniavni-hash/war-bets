<script>

const firebaseConfig = {
  apiKey: "AIzaSyDhdRoj_iD2Xjc6ZuB0QbcQ_4WyCpBKN0g",

// ========================
// DATA
// ========================
const DEFAULT_PLAYERS = [
  { id: 1, name: "Г—в„ўГ—вҖўГ—В Г—в„ў", emoji: "Г°ЕёЕҪВҜ", color: "#3B82F6" },
  { id: 2, name: "Г—вҖңГ—вҖўГ—вҖңГ—в„ў", emoji: "Г°ЕёвҖқВҘ", color: "#EF4444" },
  { id: 3, name: "Г—В Г—вҖўГ—ВўГ—Вқ", emoji: "ГўЕЎВЎ", color: "#F59E0B" },
  { id: 4, name: "Г—В Г—ЛңГ—Вў Г—вҖқГ—вҖҳГ—Её", emoji: "Г°ЕёЕ’Её", color: "#10B981" },
  { id: 5, name: "Г—В Г—ЛңГ—Вў Г—вҖқГ—вҖҳГ—ВӘ", emoji: "Г°ЕёвҖҷЕҪ", color: "#EC4899" },
  { id: 6, name: "Г—Е“Г—в„ўГ—ВҗГ—вҖўГ—ВЁГ—вҖқ", emoji: "ГўЕ“ВЁ", color: "#06B6D4" },
  { id: 7, name: "Г—В©Г—В Г—в„ў", emoji: "Г°ЕёЕҪВІ", color: "#8B5CF6" },
  { id: 8, name: "Г—Е“Г—в„ўГ—ЛңГ—Е“", emoji: "Г°ЕёВҸвҖ ", color: "#F97316" },
  { id: 9, name: "Г—вҖҷГ—Е“", emoji: "Г°ЕёЕ’Е ", color: "#14B8A6" },
  { id: 10, name: "Г—вҖҷГ—в„ўГ—Вҗ", emoji: "Г°ЕёВҰВҒ", color: "#A855F7" },
];

let PLAYERS = [...DEFAULT_PLAYERS];

const CATEGORIES = [
  { id: "alerts", label: "Г—ЕҫГ—ВЎГ—ВӨГ—ВЁ Г—ВҗГ—вҖ“Г—ВўГ—В§Г—вҖўГ—ВӘ", icon: "Г°ЕёЕЎВЁ", type: "number", description: "Г—вҖәГ—ЕҫГ—вҖқ Г—ВҗГ—вҖ“Г—ВўГ—В§Г—вҖўГ—ВӘ Г—в„ўГ—вҖқГ—в„ўГ—вҖў Г—ЕҫГ—вҖ”Г—ВЁ?" },
  { id: "falls", label: "Г—ЕҫГ—ВЎГ—ВӨГ—ВЁ Г—В Г—ВӨГ—в„ўГ—Е“Г—вҖўГ—ВӘ", icon: "Г°ЕёвҖҷВҘ", type: "number", description: "Г—вҖәГ—ЕҫГ—вҖқ Г—В Г—ВӨГ—в„ўГ—Е“Г—вҖўГ—ВӘ Г—в„ўГ—вҖқГ—в„ўГ—вҖў Г—ЕҫГ—вҖ”Г—ВЁ?" },
  { id: "timeRange", label: "Г—В©Г—ВўГ—ВӘ Г—ВҗГ—вҖ“Г—ВўГ—В§Г—вҖқ Г—ВЁГ—ВҗГ—В©Г—вҖўГ—В Г—вҖқ", icon: "ГўВҸВ°", type: "time", description: "Г—ЕҫГ—ВӘГ—в„ў Г—ВӘГ—вҖқГ—в„ўГ—вҖқ Г—вҖқГ—ВҗГ—вҖ“Г—ВўГ—В§Г—вҖқ Г—вҖқГ—ВЁГ—ВҗГ—В©Г—вҖўГ—В Г—вҖқ Г—ЕҫГ—вҖ”Г—ВЁ?" },
];

const TIME_OPTIONS = [
  "00:00-02:00","02:00-04:00","04:00-06:00","06:00-08:00",
  "08:00-10:00","10:00-12:00","12:00-14:00","14:00-16:00",
  "16:00-18:00","18:00-20:00","20:00-22:00","22:00-00:00",
  "Г—Е“Г—Вҗ Г—ВӘГ—вҖқГ—в„ўГ—вҖқ"
];

const ADMIN_ID = 1; // Г—в„ўГ—вҖўГ—В Г—в„ў is admin
const ADMIN_PASSWORD = 'dan11'; // Г—ВЎГ—в„ўГ—ВЎГ—ЕҫГ—Вҗ Г—Е“Г—вҖәГ—В Г—в„ўГ—ВЎГ—вҖқ Г—вҖәГ—в„ўГ—вҖўГ—В Г—в„ў
const BET_DEADLINE_HOUR = 21; // 21:00

// ========================
// STATE
// ========================
let db;
let currentUserId = null;
let gameData = { bets: {}, results: {}, scores: {}, registrations: {} };
let todayKey = getTodayKey();
let tomorrowKey = getTomorrowKey();
let deadlineTimer = null;

function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getTomorrowKey() {
  const d = new Date();
  d.setDate(d.getDate() + 1);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getBetDayKey() {
  // Bets are always for tomorrow
  return tomorrowKey;
}

function getResultsDayKey() {
  // Results are entered for today
  return todayKey;
}

function formatDate(key) {
  if (!key) return new Date().toLocaleDateString("he-IL", { weekday:"long", year:"numeric", month:"long", day:"numeric" });
  const [y,m,d] = key.split('-').map(Number);
  return new Date(y, m-1, d).toLocaleDateString("he-IL", { weekday:"long", year:"numeric", month:"long", day:"numeric" });
}

function formatTomorrow() {
  const d = new Date();
  d.setDate(d.getDate() + 1);
  return d.toLocaleDateString("he-IL", { weekday:"long", month:"long", day:"numeric" });
}

function isBettingOpen() {
  const now = new Date();
  return now.getHours() < BET_DEADLINE_HOUR;
}

function getTimeToDeadline() {
  const now = new Date();
  const deadline = new Date(now);
  deadline.setHours(BET_DEADLINE_HOUR, 0, 0, 0);
  if (now >= deadline) return "Г—вҖқГ—вҖқГ—в„ўГ—ЕҫГ—вҖўГ—ВЁГ—в„ўГ—Вқ Г—ВЎГ—вҖҷГ—вҖўГ—ВЁГ—в„ўГ—Вқ Г—Е“Г—вҖқГ—в„ўГ—вҖўГ—Вқ";
  const diff = deadline - now;
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  return `${h} Г—В©Г—ВўГ—вҖўГ—ВӘ Г—вҖў-${m} Г—вҖңГ—В§Г—вҖўГ—ВӘ`;
}

function getUser() { return PLAYERS.find(p => p.id === currentUserId); }

// ========================
// FIREBASE
// ========================
function initFirebase() {
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    listenToData();
    listenToPlayers();
    listenToRegistrations();
  } catch(e) {
    console.warn("Firebase unavailable, using localStorage fallback");
    db = null;
    loadLocalData();
  }
  showLoginOrApp();
}

function listenToData() {
  if (!db) return;
  const betDay = getBetDayKey();
  const resDay = getResultsDayKey();

  // Listen to tomorrow's bets (what people are betting on)
  db.ref(`days/${betDay}/bets`).on('value', snap => {
    gameData.bets = snap.val() || {};
    renderActiveScreen();
  });

  // Listen to today's results (what admin enters)
  db.ref(`days/${resDay}/results`).on('value', snap => {
    gameData.results = snap.val() || {};
    renderActiveScreen();
  });

  // Listen to total scores
  db.ref('scores').on('value', snap => {
    gameData.scores = snap.val() || {};
    renderActiveScreen();
  });
}

function listenToPlayers() {
  if (!db) return;
  db.ref('players').on('value', snap => {
    const data = snap.val();
    if (data) {
      PLAYERS = Object.values(data).sort((a,b) => a.id - b.id);
    }
    renderActiveScreen();
  });
}

function listenToRegistrations() {
  if (!db) return;
  db.ref('registrations').on('value', snap => {
    gameData.registrations = snap.val() || {};
    // Re-render login if visible
    if (document.getElementById('login').style.display !== 'none') {
      showLogin();
    }
  });
}

function saveBet(userId, bets) {
  const betDay = getBetDayKey();
  if (db) {
    db.ref(`days/${betDay}/bets/${userId}`).set(bets);
  } else {
    if (!gameData.bets) gameData.bets = {};
    gameData.bets[userId] = bets;
    saveLocal();
    renderActiveScreen();
  }
}

function saveResults(results) {
  const resDay = getResultsDayKey();
  if (db) {
    db.ref(`days/${resDay}/results`).set(results);
  } else {
    gameData.results = results;
    saveLocal();
    renderActiveScreen();
  }
}

function saveScores(scores) {
  if (db) {
    db.ref('scores').set(scores);
  } else {
    gameData.scores = scores;
    saveLocal();
    renderActiveScreen();
  }
}

function registerPlayer(playerId) {
  if (db) {
    const deviceId = getDeviceId();
    db.ref(`registrations/${playerId}`).set({ deviceId, timestamp: Date.now() });
  }
  gameData.registrations[playerId] = { deviceId: getDeviceId(), timestamp: Date.now() };
}

function getDeviceId() {
  let id = localStorage.getItem('warBets_deviceId');
  if (!id) {
    id = 'dev_' + Math.random().toString(36).substr(2, 12);
    localStorage.setItem('warBets_deviceId', id);
  }
  return id;
}

function savePlayersToFirebase() {
  if (db) {
    const data = {};
    PLAYERS.forEach(p => { data[p.id] = p; });
    db.ref('players').set(data);
  }
}

function loadLocalData() {
  try {
    const s = localStorage.getItem('warBets_v3');
    if (s) {
      const d = JSON.parse(s);
      gameData = d.gameData || { bets:{}, results:{}, scores:{}, registrations:{} };
    }
  } catch(e) {}
}

function saveLocal() {
  try {
    localStorage.setItem('warBets_v3', JSON.stringify({ gameData }));
  } catch(e) {}
}

function showLogin() {
  document.getElementById('login').style.display = '';

  const deviceId = getDeviceId();
  const regs = gameData.registrations || {};

  let html = `
    <div style="font-size:48px;margin-bottom:8px">Г°ЕёЕҪВҜГ°ЕёЕЎвӮ¬</div>
    <div class="login-title">Г—вҖқГ—в„ўГ—ЕҫГ—вҖўГ—ВЁГ—в„ў Г—вҖқГ—ЕҫГ—Е“Г—вҖ”Г—ЕҫГ—вҖқ</div>
    <div class="login-sub">Г—В§Г—вҖўГ—ЕҫГ—ВӨГ—Е“Г—В§Г—ВЎ Г—вҖңГ—Её Г—В©Г—вҖўГ—ЕҫГ—ВЁГ—вҖўГ—Её 11</div>
    <div class="login-location">Г—вҖҳГ—вҖ”Г—ВЁ Г—ВҗГ—ВӘ Г—вҖқГ—В©Г—Вқ Г—В©Г—Е“Г—ЕЎ Г—вҖәГ—вҖңГ—в„ў Г—Е“Г—вҖқГ—в„ўГ—ВЁГ—В©Г—Вқ</div>
    <div class="login-grid">`;

  // If device already registered, lock to that player only
  const myRegisteredId = localStorage.getItem('warBets_registeredPlayerId');
  const myRegInt = myRegisteredId ? parseInt(myRegisteredId) : null;

  PLAYERS.forEach(p => {
    const reg = regs[p.id];
    const takenByOther = reg && reg.deviceId && reg.deviceId !== deviceId;
    const takenByMe = reg && reg.deviceId === deviceId;
    // If this device already picked someone, lock out all others
    const lockedOut = myRegInt && p.id !== myRegInt;
    const disabled = takenByOther || lockedOut;
    const cls = disabled ? 'login-btn taken' : 'login-btn';
    // Г—в„ўГ—вҖўГ—В Г—в„ў requires password on first registration; once registered, direct login
    const onclickFn = disabled ? '' : (p.id === ADMIN_ID && !takenByMe ? 'loginAsAdmin()' : `loginAs(${p.id})`);

    html += `<button class="${cls}" style="border-color:${p.color}33${takenByMe ? `;background:${p.color}22` : ''}" onclick="${onclickFn}">
      <span class="emoji">${p.emoji}</span>
      <span class="name" style="color:${p.color}">${p.name}</span>
      ${lockedOut ? '<span style="position:absolute;top:6px;left:6px;font-size:11px">Г°ЕёвҖқвҖҷ</span>' : ''}
    </button>`;
  });

  html += `</div>`;
  document.getElementById('login').innerHTML = html;
}

function loginAs(id) {
  currentUserId = id;
  localStorage.setItem('warBets_userId', id);
  localStorage.setItem('warBets_registeredPlayerId', id); // Г—В Г—ВўГ—Е“ Г—ВҗГ—ВӘ Г—вҖқГ—вҖҳГ—вҖ”Г—в„ўГ—ВЁГ—вҖқ Г—Е“Г—ВӘГ—ЕҫГ—в„ўГ—вҖң

function checkAdminPassword() {

  const submitted = ub._submitted;

      <p style="color:#60A5FA;font-size:13px;font-weight:600">Г—Е“Г—в„ўГ—вҖўГ—Вқ ${formatTomorrow()}</p>
      <p style="color:#9CA3AF;font-size:12px;margin-top:2px">${formatDate()}</p>

  html += `<div class="deadline-bar" id="deadline-display">`;

    html += `<span class="label">Г—вҖқГ—вҖқГ—в„ўГ—ЕҫГ—вҖўГ—ВЁГ—в„ўГ—Вқ Г—В Г—ВЎГ—вҖҷГ—ВЁГ—в„ўГ—Вқ Г—вҖҳГ—ВўГ—вҖўГ—вҖң</span><br><span class="time">${getTimeToDeadline()}</span>`;
  } else {
    html += `<span class="time" style="color:#EF4444">Г—вҖқГ—вҖқГ—в„ўГ—ЕҫГ—вҖўГ—ВЁГ—в„ўГ—Вқ Г—ВЎГ—вҖҷГ—вҖўГ—ВЁГ—в„ўГ—Вқ Г—Е“Г—вҖқГ—в„ўГ—вҖўГ—Вқ</span><br><span class="label">Г—в„ўГ—ВӨГ—ВӘГ—вҖ”Г—вҖў Г—ЕҫГ—вҖ”Г—ВЁ Г—вҖҳГ—вҖҳГ—вҖўГ—В§Г—ВЁ</span>`;
  }
  html += `</div>`;

  if (submitted) {
    html += `<div style="text-align:center;padding:20px;background:rgba(16,185,129,0.1);border-radius:12px;border:1px solid rgba(16,185,129,0.2);margin-bottom:14px">
      <div style="font-size:40px;margin-bottom:8px">ГўЕ“вҖҰ</div>
      <div style="font-weight:700;font-size:16px;color:#10B981">Г—вҖқГ—вҖқГ—в„ўГ—ЕҫГ—вҖўГ—ВЁ Г—В Г—В©Г—Е“Г—вҖ”!</div>
      <div style="color:#9CA3AF;font-size:13px;margin-top:4px">Г—ЕҫГ—вҖ”Г—вҖәГ—в„ўГ—Вқ Г—Е“Г—ВӘГ—вҖўГ—ВҰГ—ВҗГ—вҖўГ—ВӘ Г—В©Г—Е“ Г—ЕҫГ—вҖ”Г—ВЁ</div>
    </div>`;

    html += `<div class="day-summary"><h3>Г—вҖқГ—вҖқГ—в„ўГ—ЕҫГ—вҖўГ—ВЁ Г—В©Г—Е“Г—ЕЎ Г—Е“-${formatTomorrow()}:</h3>`;
    CATEGORIES.forEach(cat => {
      const v = ub[cat.id];
      html += `<div class="day-row"><span class="lbl">${cat.icon} ${cat.label}</span><span class="val">${v !== undefined ? v : '-'}</span></div>`;
    });
    html += `</div>`;

    document.getElementById('screen-bet').innerHTML = html;
    return;
  }

  if (!open) {
    html += `<div style="text-align:center;padding:30px 20px;background:rgba(239,68,68,0.1);border-radius:12px;border:1px solid rgba(239,68,68,0.2)">
      <div style="font-size:40px;margin-bottom:8px">Г°ЕёвҖқвҖҷ</div>

    document.getElementById('screen-bet').innerHTML = html;

  // Progress bar

    }

    if (cat.type === "time") {
      html += `<div class="chips">${TIME_OPTIONS.map(o =>

  html += `<button class="big-btn" style="${ready ? `background:linear-gradient(135deg,${u.color},${u.color}CC);color:#fff` : 'background:rgba(255,255,255,0.1);color:#6B7280'}"

function chgBet(catId, delta) {
  if (!isBettingOpen()) { toast('ГўВҸВ° Г—вҖқГ—вҖқГ—в„ўГ—ЕҫГ—вҖўГ—ВЁГ—в„ўГ—Вқ Г—ВЎГ—вҖҷГ—вҖўГ—ВЁГ—в„ўГ—Вқ!'); return; }
  const u = getUser();
  const ub = { ...(gameData.bets[u.id] || {}) };
  ub[catId] = Math.max(0, (ub[catId] || 0) + delta);
  gameData.bets[u.id] = ub;
  renderBet();
}

function setBet(catId, val) {
  if (!isBettingOpen()) { toast('ГўВҸВ° Г—вҖқГ—вҖқГ—в„ўГ—ЕҫГ—вҖўГ—ВЁГ—в„ўГ—Вқ Г—ВЎГ—вҖҷГ—вҖўГ—ВЁГ—в„ўГ—Вқ!'); return; }
  const u = getUser();
  const ub = { ...(gameData.bets[u.id] || {}) };
  ub[catId] = val;
  gameData.bets[u.id] = ub;
  renderBet();
}

function submitBet() {
  if (!isBettingOpen()) { toast('ГўВҸВ° Г—вҖқГ—вҖқГ—в„ўГ—ЕҫГ—вҖўГ—ВЁГ—в„ўГ—Вқ Г—ВЎГ—вҖҷГ—вҖўГ—ВЁГ—в„ўГ—Вқ!'); return; }
  const u = getUser();
  const ub = { ...(gameData.bets[u.id] || {}), _submitted: true };
  saveBet(u.id, ub);
  toast('ГўЕ“вҖҰ Г—вҖқГ—вҖқГ—в„ўГ—ЕҫГ—вҖўГ—ВЁ Г—В Г—В©Г—Е“Г—вҖ”!');
  renderBet();
  renderPlayers();
}

function renderLeaderboard() {
  const sorted = [...PLAYERS].map(p => ({...p, score: gameData.scores[p.id] || 0})).sort((a,b) => b.score - a.score);
  const medals = ["Г°ЕёВҘвҖЎ","Г°ЕёВҘЛҶ","Г°ЕёВҘвҖ°"];
  const order = [1,0,2];

  const player = PLAYERS.find(p => p.id === playerId);

  if (newName && newName.trim()) {
    player.name = newName.trim();
    savePlayersToFirebase();
    toast(`ГўЕ“вҖҰ Г—вҖқГ—В©Г—Вқ Г—ВўГ—вҖўГ—вҖңГ—вҖәГ—Её Г—Е“-${newName.trim()}`);

function addNewPlayer() {
  const name = prompt('Г—В©Г—Вқ Г—вҖқГ—ЕҫГ—В©Г—ВӘГ—ВӘГ—ВЈ Г—вҖқГ—вҖ”Г—вҖңГ—В©:');
  if (!name || !name.trim()) return;
  const emojis = ["Г°ЕёЕ’Её","Г°ЕёвҖҷВ«","Г°ЕёЕҪВӘ","Г°ЕёЕҪВӯ","Г°ЕёЕҪВЁ","Г°ЕёЕҪВө","Г°ЕёвҖқВ®","Г°ЕёЕ’ЛҶ","Г°ЕёВҚвӮ¬","Г°ЕёВҰЕ ","Г°ЕёВҗВҜ","Г°ЕёВҰвҖҰ"];
  const colors = ["#F43F5E","#D946EF","#0EA5E9","#84CC16","#FB923C","#64748B"];
  const newId = Math.max(...PLAYERS.map(p => p.id)) + 1;
  const emoji = emojis[newId % emojis.length];
  const color = colors[newId % colors.length];

  PLAYERS.push({ id: newId, name: name.trim(), emoji, color });
  savePlayersToFirebase();
  toast(`ГўЕ“вҖҰ ${name.trim()} Г—В Г—вҖўГ—ВЎГ—ВЈ!`);
  renderAllScreens();
}

function chgRes(catId, delta) {
  if (!gameData.results) gameData.results = {};
  gameData.results[catId] = Math.max(0, (gameData.results[catId] || 0) + delta);
  renderAdmin();
}

function setRes(catId, val) {
  if (!gameData.results) gameData.results = {};
  gameData.results[catId] = val;
  renderAdmin();
}

function calcScores() {
  const res = gameData.results || {};
  const filled = CATEGORIES.filter(c => res[c.id] !== undefined && res[c.id] !== "").length;
  if (filled < CATEGORIES.length) {
    toast('ГўЕЎВ ГҜВёВҸ Г—ЕҫГ—Е“Г—Вҗ Г—ВҗГ—ВӘ Г—вҖәГ—Е“ Г—вҖқГ—ВӘГ—вҖўГ—ВҰГ—ВҗГ—вҖўГ—ВӘ');
    return;
  }

  // Save results
  saveResults(res);

  // Scores are calculated based on today's bets (which were placed yesterday for today)
  // We need to read today's bets from Firebase
  const resDay = getResultsDayKey();

  if (db) {
    db.ref(`days/${resDay}/bets`).once('value', snap => {
      const todayBets = snap.val() || {};
      doCalcScores(todayBets, res);
    });
  } else {
    // Fallback: use current bets
    doCalcScores(gameData.bets, res);
  }
}

function doCalcScores(bets, res) {
  const newScores = { ...(gameData.scores || {}) };

  PLAYERS.forEach(p => {
    const pb = bets[p.id];
    if (!pb || !pb._submitted) return;

    let dayScore = 0;
    CATEGORIES.forEach(cat => {
      const bet = pb[cat.id];
      const actual = res[cat.id];
      if (bet === undefined || actual === undefined) return;

      if (cat.type === "number") {
        const diff = Math.abs(bet - actual);
        if (diff === 0) dayScore += 10;
        else if (diff === 1) dayScore += 5;
        else if (diff === 2) dayScore += 3;
        else if (diff <= 5) dayScore += 1;
      } else if (cat.type === "time") {
        if (bet === actual) dayScore += 10;
        else {
          const d = Math.abs(TIME_OPTIONS.indexOf(bet) - TIME_OPTIONS.indexOf(actual));
          if (d === 1) dayScore += 5;
          else if (d === 2) dayScore += 3;
        }
      }
    });

    newScores[p.id] = (newScores[p.id] || 0) + dayScore;
  });

  saveScores(newScores);
  toast('Г°ЕёВҸвҖ  Г—вҖқГ—В Г—в„ўГ—В§Г—вҖўГ—вҖң Г—вҖ”Г—вҖўГ—В©Г—вҖҳ Г—вҖўГ—ВӨГ—вҖўГ—ВЁГ—ВЎГ—Вқ!');
  setTimeout(() => switchTab('leaderboard'), 1000);
}
